upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # Максимальный размер загружаемого файла
    client_max_body_size 15M;

    # Запросы к API — передаём Django
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Статические файлы — отдаём напрямую через nginx (быстрее!)
    location /static/ {
        alias /app/static/;
    }

    # Медиафайлы (загруженные документы)
    location /media/ {
        alias /app/media/;

        # Запрещаем прямой доступ к чужим файлам
        # В реальном проекте здесь была бы проверка токена
        internal;
    }
}
