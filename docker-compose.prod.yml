version: '3.9'

services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    # gunicorn — production WSGI сервер, не используй runserver в продакшене!
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    restart: always
    volumes:
      - media:/app/media
      - static:/app/static
    env_file:
      - .env
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media:/app/media
      - static:/app/static
    depends_on:
      - web

volumes:
  postgres_data:
  media:
  static:
    